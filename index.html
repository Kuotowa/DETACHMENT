            0%, 100% {

                opacity: 0.35;
            }
            25% {
                transform: translate(8px, -12px) scale(1.1);
                opacity: 0.5;
            }
            50% {
                transform: translate(-4px, -20px) scale(0.9);
                opacity: 0.4;
            }
            75% {
                transform: translate(12px, -8px) scale(1.05);
                opacity: 0.45;
            }
        }

        /* 蒙版睁开效果 */
        .eye-mask {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 200px;
            height: 100px;
            background-color: #000;
            border-radius: 50%;
            transform: translate(-50%, -50%) scale(0.1);
            z-index: 9997;
            animation: eyeOpen 1s ease-in-out forwards;
        }

        @keyframes eyeOpen {
            0% {
                transform: translate(-50%, -50%) scale(0.1);
                opacity: 1;
            }
            50% {
                transform: translate(-50%, -50%) scale(15);
                opacity: 1;
            }
            100% {
                transform: translate(-50%, -50%) scale(15);
                opacity: 0;
                pointer-events: none;
            }
        }

        /* 主舞台容器 */
        .stage {
            position: relative;
            width: 2551px;
            height: 3685px;
            background-color: #000;
            cursor: pointer;
            text-align: left;
        }

        /* 统一的图层基础样式 */
        .layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-position: center center;
            background-size: cover;
            background-repeat: no-repeat;
            pointer-events: none; /* 让图层不阻挡点击事件 */
        }

        /* 图层 1：底层 */
        .layer-bg {
            background-image: url('./assets/底层.png');
            z-index: 1;
        }

        /* 图层 2：眼睛层 (动态视频) */
        .layer-eye {
            z-index: 2;
            mix-blend-mode: soft-lightdge; /* 颜色减淡以融合底色 */
        }

        .layer-eye video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            background-color: transparent;
            opacity: 0.2;
            filter: grayscale(100%);
        }

        /* 图层 3：主标元素 (白色细线圈等) */
        .layer-main-elements {
            background-image: url('./assets/主标元素.png');
            z-index: 3;
        }

        /* 图层 4：剥离 (主标题) */
        .layer-title-container {
            position: absolute;
            z-index: 4;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .layer-title {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* 图层 5：零散元素 (红色像素点) */
        .layer-particles {
            background-image: url('./assets/零散元素.png');
            z-index: 5;
        }

        /* --- 动画定义 --- */

        /* 眼睛层：极慢的透明度呼吸效果 */
        @keyframes breathe {
            0% { opacity: 0.1; }
            100% { opacity: 0.3; }
        }

        /* 多重偏色闪烁(Glitch)效果 */
        @keyframes glitch {
            0%, 100% {
                opacity: 1;
                transform: translate(0, 0);
            }
            5% {
                opacity: 0.8;
                transform: translate(1px, -1px);
            }
            10% {
                opacity: 0.9;
                transform: translate(-1px, 1px);
            }
            15% {
                opacity: 0.7;
                transform: translate(1px, 1px);
            }
            20% {
                opacity: 1;
                transform: translate(0, 0);
            }
            25% {
                opacity: 0.85;
                transform: translate(-1px, -1px);
            }
            30% {
                opacity: 0.95;
                transform: translate(1px, 0);
            }
            35% {
                opacity: 0.8;
                transform: translate(0, -1px);
            }
            40% {
                opacity: 1;
                transform: translate(0, 0);
            }
            45% {

                transform: translate(-1px, 0);
            }
            50% {

                transform: translate(0, 1px);
            }
            55% {

            70% {

            75% {

                transform: translate(0, -1px);
            }
            80% {

                transform: translate(0, 0);
            }
            85% {
                opacity: 0.85;
                transform: translate(1px, 0);
            }
            90% {
                opacity: 0.9;
                transform: translate(-1px, -1px);
            }
            95% {
                opacity: 0.95;
                transform: translate(0, 1px);
            }
        }



        /* 剥离标题：RGB Split 与模糊变清晰的抽离效果 */
        @keyframes detach {
            0% {
                filter: blur(20px) drop-shadow(15px 0 0 rgba(255,0,0,0.8)) drop-shadow(-15px 0 0 rgba(0,255,100,0.8));
                transform: scale(1.15);
                opacity: 0;
            }
            40% {
                filter: blur(10px) drop-shadow(8px 0 0 rgba(255,0,0,0.6)) drop-shadow(-8px 0 0 rgba(0,255,100,0.6));
                opacity: 0.6;
            }
            70% {
                filter: blur(4px) drop-shadow(3px 0 0 rgba(255,0,0,0.3)) drop-shadow(-3px 0 0 rgba(0,255,100,0.3));
                opacity: 0.9;
            }
            100% {
                filter: blur(0px) drop-shadow(0 0 0 rgba(255,0,0,0)) drop-shadow(0 0 0 rgba(0,255,100,0));
                transform: scale(1);
                opacity: 1;
            }
        }

            font-size: 3.5rem;
            color: #ffffff;

            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
            margin-left: 43.2px;

        .invitation-panel {

            bottom: -100%; /* 初始隐藏在屏幕下方 */
            left: 0;
            width: 100%;
            height: 80%; /* 占据下方大部分空间 */
            /* 渐变黑色半透明背景 */

            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 40px 30px;
            box-sizing: border-box;
            transition: bottom 1.5s cubic-bezier(0.19, 1, 0.22, 1); /* 极为平滑的 Slide Up */
            pointer-events: none; /* 展开前不响应事件 */
        }

        .invitation-panel.show {
            bottom: 0;
            pointer-events: auto; /* 展开后允许内容交互 */
        }

        .invitation-content {
            max-height: 100%;
            overflow-y: auto; /* 内容过多可滑动 */
            padding-bottom: 20px;
            pointer-events: auto;
        }

        /* 隐藏滚动条但保留功能 */

        .invitation-title {
            font-size: 100px;
            text-align: center;
            margin-bottom: 70px;
            letter-spacing: 24px;
            text-indent: 24px;
            font-weight: bold;
            font-family: Impact, Charcoal, sans-serif;
            color: #ffffff;
            flex-direction: column;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            padding-bottom: 35px;

        .invitation-text {
            font-size: 2.8rem;

            margin-bottom: 60px;
            text-align: justify;
            letter-spacing: 6px;
            color: #ececec;
            font-family: "SimHei", "Heiti TC", "黑体", sans-serif;

        .invitation-content .invitation-text:nth-child(3) {

        .invitation-content .invitation-text:nth-child(4) {

        }
        
        .invitation-text strong {
            font-weight: bold;

            border-bottom: 1px solid rgba(255, 255, 255, 0.3);

        .invitation-footer {

        /* 确保所有邀请函内文字都是黑体 */
        .invitation-content {
            font-family: "SimHei", "Heiti TC", "黑体", sans-serif;
            font-size: 70px;
        }
    </style>

            const blackScreen = document.getElementById('blackScreen');
            const blurOverlay = document.getElementById('blurOverlay');
            let isPanelShown = false;
            let isInteractive = false;

            // 计算并应用缩放
            const resizeCanvas = () => {
                const canvasWidth = 2551;
                const canvasHeight = 3685;
                const windowWidth = window.innerWidth;
                const windowHeight = window.innerHeight;
                
                // 计算缩放比例，取较小值以确保完整显示
                const scaleX = windowWidth / canvasWidth;
                const scaleY = windowHeight / canvasHeight;
                const scale = Math.min(scaleX, scaleY);
                
                // 应用缩放
                canvasContainer.style.transform = `scale(${scale})`;
            };

            // 触发信息区平滑升起的函数
            const togglePanel = () => {
                if (!isInteractive) return; // 确保只有在所有元素出现后才能点击
                
                if (isPanelShown) {
                    // 隐藏面板
                    isPanelShown = false;
                    panel.classList.remove('show');
                    hint.style.opacity = '1'; // 显示点击提示
                } else {
                    // 显示面板
                    isPanelShown = true;
                    panel.classList.add('show');
                    hint.style.opacity = '0'; // 隐藏点击提示
                }
            };

            // 开场动画
            const startOpeningAnimation = () => {
                // 1. 移除所有元素的hidden类，让它们一开始就显示
                const hiddenElements = document.querySelectorAll('.hidden-element');
                hiddenElements.forEach(element => {
                    element.classList.remove('hidden-element');
                    element.style.opacity = '1';
                });
                
                // 2. 移除眼睛的初始隐藏状态
                const layerEye = document.querySelector('.layer-eye');
                layerEye.style.opacity = '1';
                
                // 3. 0.5秒后开始蒙版睁开动画
                setTimeout(() => {
                    // 移除黑屏
                    blackScreen.classList.add('hidden');
                }, 500);
                
                // 4. 1.5秒后开始模糊变清晰
                setTimeout(() => {
                    blurOverlay.classList.add('hidden');
                }, 1500);
                
                // 5. 2秒后启用交互
                setTimeout(() => {
                    isInteractive = true;
                    hint.style.opacity = '1'; // 显示点击提示
                }, 2000);
            };

            // 页面加载后开始开场动画
            startOpeningAnimation();
            
            // 初始化缩放
            resizeCanvas();
            
            // 监听窗口大小变化
            window.addEventListener('resize', resizeCanvas);

            // 交互：点击屏幕任何位置触发
            stage.addEventListener('click', togglePanel);
        });
    </script>
</body>
</html>
